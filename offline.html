<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="theme-color" content="#6f1f17" />

    <meta name="description" content="Página sin conexión de La Lucha Sanguchería Criolla." />

    <link rel="manifest" href="site.webmanifest" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
    <link rel="icon" href="assets/icons/icon-192.png" />

    <title>Sin conexión | La Lucha Sanguchería Criolla</title>

    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/layout.css" />

    <style>
      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: var(--space-5);
      }

      .offline {
        max-width: 36rem;
        padding: var(--space-7);
        text-align: center;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
      }

      .offline h1 {
        margin-bottom: var(--space-4);
        color: var(--color-brand-dark);
      }

      .offline p {
        margin-inline: auto;
        color: var(--color-muted);
      }

      .offline a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.75rem;
        margin-top: var(--space-4);
        padding-inline: var(--space-5);
        color: var(--color-surface);
        font-weight: 700;
        background: var(--color-brand);
        border-radius: var(--radius-pill);
      }
    </style>
  </head>

  <body>
    <main class="offline">
      <h1>Estás sin conexión</h1>

      <p>
        La Lucha no pudo cargar nuevos datos, pero puedes volver al inicio cuando recuperes la
        conexión.
      </p>

      <a href="index.html">Volver a La Lucha</a>
    </main>
  </body>
</html>
